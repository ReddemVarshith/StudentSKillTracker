<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SST - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .dashboard-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
        }

        /* Sidebar Styling */
        .sidebar {
            background: rgba(15, 17, 26, 0.8);
            border-right: 1px solid var(--border-color);
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .user-block {
            text-align: center;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            margin: 0 auto 16px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: white;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--text-muted);
            border-radius: 12px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .nav-link:hover,
        .nav-link.active {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
        }

        /* Main Content */
        .main-content {
            padding: 40px;
            overflow-y: auto;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-top: 32px;
        }

        .stat-card {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            border-top: 4px solid var(--primary);
            position: relative;
            overflow: hidden;
        }

        .stat-card.leetcode {
            border-top-color: var(--leetcode);
        }

        .stat-card.codechef {
            border-top-color: var(--codechef);
        }

        .stat-card.gfg {
            border-top-color: var(--gfg);
        }

        .stat-card.hackerrank {
            border-top-color: var(--hackerrank);
        }

        .platform-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .metric {
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .metric-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .metric-value {
            font-size: 1.25rem;
            font-weight: 700;
            color: white;
        }

        /* Loading Skeleton */
        .skeleton {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.05) 25%, rgba(255, 255, 255, 0.1) 50%, rgba(255, 255, 255, 0.05) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 4px;
        }

        @keyframes loading {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        @media (max-width: 900px) {
            .dashboard-layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                padding: 16px;
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                gap: 12px;
            }

            .user-block {
                border-bottom: none;
                padding: 0;
                display: flex;
                align-items: center;
                gap: 12px;
                text-align: left;
            }

            .avatar {
                width: 40px;
                height: 40px;
                margin: 0;
                font-size: 1rem;
            }

            .nav-link {
                padding: 8px 12px;
            }
        }
    </style>
</head>

<body>

    <!-- Background Particles -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="user-block">
                <div class="avatar" id="user-initial">?</div>
                <div>
                    <h3 id="sidebar-name">Loading...</h3>
                    <p id="sidebar-dept" style="font-size: 0.85rem;"></p>
                </div>
            </div>

            <nav style="display: flex; flex-direction: column; gap: 8px; flex: 1;">
                <a href="dashboard.html" class="nav-link active" style="text-decoration: none;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    Dashboard
                </a>
                <a href="leaderboard.html" class="nav-link" style="text-decoration: none;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon
                            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
                        </polygon>
                    </svg>
                    Leaderboard
                </a>
                <a href="hackathons.html" class="nav-link" style="text-decoration: none;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2l3 6 6 1-4 4 1 6-6-3-6 3 1-6-4-4 6-1 3-6z"></path>
                    </svg>
                    <span>Hackathons</span>
                </a>
                <a href="setup.html" class="nav-link" id="nav-edit-profile" style="text-decoration: none;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    Edit Profile
                </a>
            </nav>

            <div class="nav-link" id="nav-logout" style="color: var(--error);">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Logout
            </div>
        </aside>

        <main class="main-content">
            <header>
                <h1 style="font-size: 2rem; margin-bottom: 8px;">Your Skill Board</h1>
                <p>Aggregated real-time metrics across all your registered platforms.</p>
            </header>

            <div class="stats-grid" id="stats-container">
                <!-- Skeleton Loading Cards -->
                <div class="glass-panel stat-card">
                    <div class="skeleton" style="height: 24px; width: 40%;"></div>
                    <div class="metrics">
                        <div class="skeleton metric" style="height: 60px;"></div>
                        <div class="skeleton metric" style="height: 60px;"></div>
                    </div>
                </div>
                <div class="glass-panel stat-card">
                    <div class="skeleton" style="height: 24px; width: 40%;"></div>
                    <div class="metrics">
                        <div class="skeleton metric" style="height: 60px;"></div>
                        <div class="skeleton metric" style="height: 60px;"></div>
                    </div>
                </div>
            </div>
            <div
                style="margin-top: 40px; background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 12px; padding: 24px;">
                <h3 style="margin-bottom: 24px;">Score Distribution</h3>
                <div style="height: 350px; display: flex; justify-content: center; position: relative;">
                    <canvas id="skillsChart"></canvas>
                </div>
            </div>
        </main>
    </div>

    <!-- Script Handling -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/dashboard.js"></script>
</body>

</html>
