<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SST - Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .dashboard-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            background: rgba(15, 17, 26, 0.8);
            border-right: 1px solid var(--border-color);
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .user-block {
            text-align: center;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            margin: 0 auto 16px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: white;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
        }

        .main-content {
            padding: 40px;
            overflow-y: auto;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--text-muted);
            border-radius: 12px;
            transition: all 0.2s;
            cursor: pointer;
            text-decoration: none;
        }

        .nav-link:hover,
        .nav-link.active {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
        }

        /* Podium Styles */
        .podium-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 16px;
            margin: 40px 0;
            height: 250px;
        }

        .podium-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 120px;
            text-align: center;
        }

        .podium-bar {
            width: 100%;
            border-radius: 8px 8px 0 0;
            margin-top: 16px;
            background: linear-gradient(180deg, var(--primary) 0%, rgba(99, 102, 241, 0) 100%);
        }

        .podium-1 {
            background: linear-gradient(180deg, #fbbf24 0%, rgba(251, 191, 36, 0.2) 100%);
            width: 140px;
        }

        .podium-2 {
            background: linear-gradient(180deg, #94a3b8 0%, rgba(148, 163, 184, 0.2) 100%);
        }

        .podium-3 {
            background: linear-gradient(180deg, #b45309 0%, rgba(180, 83, 9, 0.2) 100%);
        }

        .avatar-sm {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .avatar-xs {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: white;
            font-weight: bold;
        }

        /* Table Styles */
        .glass-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
            margin-top: 24px;
        }

        .glass-table th {
            text-align: left;
            padding: 16px;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
        }

        .glass-table td {
            padding: 16px;
            background: var(--bg-panel);
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .glass-table td:first-child {
            border-left: 1px solid var(--border-color);
            border-radius: 12px 0 0 12px;
        }

        .glass-table td:last-child {
            border-right: 1px solid var(--border-color);
            border-radius: 0 12px 12px 0;
        }

        .glass-table tr:hover td {
            background: rgba(255, 255, 255, 0.05);
        }

        .active-row td {
            background: rgba(99, 102, 241, 0.1);
            border-color: rgba(99, 102, 241, 0.3);
        }

        .tab-btn {
            padding: 8px 16px;
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tab-btn:hover,
        .tab-btn.active {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            border-color: rgba(99, 102, 241, 0.5);
        }

        @media (max-width: 900px) {
            .dashboard-layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                padding: 16px;
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                gap: 12px;
            }

            .user-block {
                border-bottom: none;
                padding: 0;
                display: flex;
                align-items: center;
                gap: 12px;
                text-align: left;
            }

            .avatar {
                width: 40px;
                height: 40px;
                margin: 0;
                font-size: 1rem;
            }

            .main-content {
                padding: 20px;
            }

            .glass-table {
                font-size: 0.9rem;
            }

            .nav-link {
                padding: 8px 12px;
            }
        }
    </style>
</head>

<body>
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="user-block">
                <div class="avatar" id="user-initial">?</div>
                <div>
                    <h3 id="sidebar-name">Loading...</h3>
                    <p id="sidebar-dept" style="font-size: 0.85rem;"></p>
                </div>
            </div>

            <nav style="display: flex; flex-direction: column; gap: 8px; flex: 1;">
                <a href="dashboard.html" class="nav-link" style="text-decoration: none;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    Dashboard
                </a>
                <a href="leaderboard.html" class="nav-link active" style="text-decoration: none;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon
                            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
                        </polygon>
                    </svg>
                    Leaderboard
                </a>
                <a href="hackathons.html" class="nav-link" style="text-decoration: none;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2l3 6 6 1-4 4 1 6-6-3-6 3 1-6-4-4 6-1 3-6z"></path>
                    </svg>
                    <span>Hackathons</span>
                </a>
                <a href="setup.html" class="nav-link" id="nav-edit-profile" style="text-decoration: none;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    Edit Profile
                </a>
            </nav>

            <div class="nav-link" id="nav-logout" style="color: var(--error);">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Logout
            </div>
        </aside>

        <main class="main-content">
            <header>
                <h1 style="font-size: 2.2rem; margin-bottom: 8px;">Global Leaderboard</h1>
                <p>See how you rank against peers across all competitive platforms.</p>
            </header>

            <div class="platform-tabs"
                style="display: flex; gap: 12px; margin-top: 24px; overflow-x: auto; padding-bottom: 8px;">
                <button class="tab-btn active" data-platform="total">Global</button>
                <button class="tab-btn" data-platform="leetcode">LeetCode</button>
                <button class="tab-btn" data-platform="codechef">CodeChef</button>
                <button class="tab-btn" data-platform="gfg">GeeksForGeeks</button>
                <button class="tab-btn" data-platform="hackerrank">HackerRank</button>
            </div>

            <div class="podium-container" id="rank-top-3">
                <!-- Podium Rendered via JS -->
            </div>

            <div style="overflow-x: auto;">
                <table class="glass-table">
                    <thead>
                        <tr id="table-head-row">
                            <th>Rank</th>
                            <th>Student Code</th>
                            <th>LeetCode Slvd</th>
                            <th>CodeChef / GFG</th>
                            <th style="text-align: right;" id="score-header">Total Score</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body">
                        <!-- Table Rendered via JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/leaderboard.js"></script>
</body>

</html>
