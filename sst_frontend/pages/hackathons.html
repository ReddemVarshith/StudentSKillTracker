<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SST - Hackathons</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .dashboard-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            background: rgba(15, 17, 26, 0.8);
            border-right: 1px solid var(--border-color);
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .user-block {
            text-align: center;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            margin: 0 auto 16px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: white;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
        }

        .main-content {
            padding: 40px;
            overflow-y: auto;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--text-muted);
            border-radius: 12px;
            transition: all 0.2s;
            cursor: pointer;
            text-decoration: none;
        }

        .nav-link:hover,
        .nav-link.active {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
        }

        /* Hackathon Grid Styles */
        .hackathon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-top: 24px;
        }

        .hackathon-card {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .hackathon-card:hover {
            transform: translateY(-4px);
            border-color: rgba(99, 102, 241, 0.5);
        }

        .card-badge {
            position: absolute;
            top: 16px;
            right: 16px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-winner {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
            border: 1px solid rgba(251, 191, 36, 0.5);
        }

        .badge-participant {
            background: rgba(148, 163, 184, 0.2);
            color: #94a3b8;
            border: 1px solid rgba(148, 163, 184, 0.5);
        }

        /* Add Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 32px;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 24px;
            right: 24px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 24px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .conditional-fields {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            grid-column: span 2;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px dashed var(--border-color);
        }

        .conditional-fields.active {
            display: grid;
            animation: slideDown 0.3s ease-out forwards;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 900px) {
            .dashboard-layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                padding: 16px;
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                gap: 12px;
            }

            .user-block {
                border-bottom: none;
                padding: 0;
                display: flex;
                align-items: center;
                gap: 12px;
                text-align: left;
            }

            .avatar {
                width: 40px;
                height: 40px;
                margin: 0;
                font-size: 1rem;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .form-group.full-width,
            .conditional-fields {
                grid-column: span 1;
            }

            .conditional-fields {
                grid-template-columns: 1fr;
            }

            .nav-link span {
                display: none;
            }

            /* Hide labels on mobile to save space */
        }
    </style>
</head>

<body>
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="user-block">
                <div class="avatar" id="user-initial">?</div>
                <div>
                    <h3 id="sidebar-name">Loading...</h3>
                    <p id="sidebar-dept" style="font-size: 0.85rem;"></p>
                </div>
            </div>

            <nav style="display: flex; flex-direction: column; gap: 8px; flex: 1;">
                <a href="dashboard.html" class="nav-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    <span>Dashboard</span>
                </a>
                <a href="leaderboard.html" class="nav-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon
                            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
                        </polygon>
                    </svg>
                    <span>Leaderboard</span>
                </a>
                <a href="hackathons.html" class="nav-link active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2l3 6 6 1-4 4 1 6-6-3-6 3 1-6-4-4 6-1 3-6z"></path>
                    </svg>
                    <span>Hackathons</span>
                </a>
                <a href="setup.html" class="nav-link" id="nav-edit-profile">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <span>Edit Profile</span>
                </a>
            </nav>

            <div class="nav-link" id="nav-logout" style="color: var(--error);">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                <span>Logout</span>
            </div>
        </aside>

        <main class="main-content">
            <header style="display: flex; justify-content: space-between; align-items: flex-end;">
                <div>
                    <h1 style="font-size: 2.2rem; margin-bottom: 8px;">Hackathons</h1>
                    <p>Track your participations and showcase your winning projects.</p>
                </div>
                <button class="btn btn-primary" id="openModalBtn">
                    + Add Hackathon
                </button>
            </header>

            <div class="hackathon-grid" id="hackathons-container">
                <!-- Data populated dynamically -->
                <div
                    style="grid-column: 1/-1; padding: 40px; text-align: center; color: var(--text-muted); border: 1px dashed var(--border-color); border-radius: 12px;">
                    Loading your hackathons...
                </div>
            </div>
        </main>
    </div>

    <!-- Add Modal -->
    <div class="modal" id="addHackathonModal">
        <div class="modal-content">
            <button class="close-btn" id="closeModalBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <h2>Log Hackathon</h2>

            <form id="hackathonForm" class="form-grid">
                <div class="form-group full-width">
                    <label for="hackathon_name">Hackathon Name</label>
                    <input type="text" id="hackathon_name" required placeholder="Ex: Smart India Hackathon">
                </div>

                <div class="form-group">
                    <label for="conducted_by">Conducted By</label>
                    <input type="text" id="conducted_by" required placeholder="Ex: AICTE">
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" required
                        style="width: 100%; padding: 12px; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); color: white; border-radius: 8px;">
                </div>

                <div class="form-group full-width">
                    <label for="participation_certificate">Participation Certificate (Image/PDF)</label>
                    <input type="file" id="participation_certificate" required
                        style="padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px; width: 100%; border: 1px solid var(--border-color);">
                </div>

                <div class="form-group full-width"
                    style="display: flex; align-items: center; gap: 12px; margin-top: 8px;">
                    <input type="checkbox" id="won_checkbox"
                        style="width: 20px; height: 20px; accent-color: var(--primary);">
                    <label for="won_checkbox" style="margin: 0; font-size: 1.1rem; color: white;">I Won / Placed in this
                        Hackathon</label>
                </div>

                <div class="conditional-fields" id="winnerFields">
                    <div class="form-group">
                        <label for="place">Place / Position</label>
                        <select id="place">
                            <option value="">Select Place...</option>
                            <option value="Winner">Winner</option>
                            <option value="Runner up">Runner Up</option>
                            <option value="Bronze">Bronze (3rd)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="prize_money">Prize Money (Optional)</label>
                        <input type="text" id="prize_money" placeholder="Ex: ₹1,00,000">
                    </div>

                    <div class="form-group full-width">
                        <label for="project_title">Project Title</label>
                        <input type="text" id="project_title" placeholder="Name of your winning project">
                    </div>

                    <div class="form-group full-width">
                        <label for="domain">Project Domain</label>
                        <input type="text" id="domain" placeholder="Ex: Web3 / FinTech / Healthcare">
                    </div>

                    <div class="form-group full-width">
                        <label for="winning_certificate">Winning Certificate</label>
                        <input type="file" id="winning_certificate"
                            style="padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px; width: 100%; border: 1px solid var(--border-color);">
                    </div>
                </div>

                <div class="form-group full-width">
                    <button type="submit" class="btn btn-primary btn-block" style="margin-top: 16px;">Submit
                        Verification</button>
                    <div id="hackathon-error" class="hidden error-box" style="margin-top: 12px;"></div>
                </div>
            </form>
        </div>
    </div>

    <script src="../assets/js/api.js?v=2"></script>
    <script src="../assets/js/hackathons.js?v=2"></script>
</body>

</html>
