<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Skill Tracker - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="auth-page">

    <div class="glass-panel auth-container">
        <div class="auth-header">
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 10v6M2 10l10-5 10 5-10 5z" />
                    <path d="M6 12v5c3 3 9 3 12 0v-5" />
                </svg>
                <span>SST Connect</span>
            </div>
            <h2>Welcome Back</h2>
            <p>Enter your details to track your coding progress.</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="auth-form">
            <div class="form-group">
                <label for="login-username">Username</label>
                <input type="text" id="login-username" required placeholder="Ex: john_doe">
            </div>
            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Sign In</button>
            <p class="auth-switch">Don't have an account? <a href="#" id="showRegister">Sign up</a></p>
        </form>

        <!-- Register Form (Hidden by default) -->
        <form id="registerForm" class="auth-form hidden">
            <div class="form-group">
                <label for="reg-username">Username</label>
                <input type="text" id="reg-username" required placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label for="reg-password">Password</label>
                <input type="password" id="reg-password" required placeholder="Create a strong password">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Create Account</button>
            <p class="auth-switch">Already have an account? <a href="#" id="showLogin">Sign in</a></p>
        </form>

        <!-- Error Notification Area -->
        <div id="auth-error" class="hidden error-box"></div>
    </div>

    <!-- Particles Background UI Element -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
</body>

</html>
